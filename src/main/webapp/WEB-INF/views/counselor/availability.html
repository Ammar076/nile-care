<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">

<head>
    <title>Manage Availability - NileCare Counselor</title>
    <style>
        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1rem;
        }

        /* Card Styling */
        .card-custom {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        /* Form Styling */
        .form-label {
            font-weight: 500;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .form-control, .form-select {
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 0.75rem;
            transition: all 0.2s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Button Styling */
        .btn-primary-custom {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            border: none;
            color: white;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .btn-primary-custom:hover {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Slot Item Styling */
        .slot-item {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .slot-item:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        .slot-item.booked {
            background-color: #fef3c7;
            border-color: #fbbf24;
        }

        .slot-info {
            flex-grow: 1;
        }

        .slot-date {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.25rem;
        }

        .slot-time {
            color: #64748b;
            font-size: 0.875rem;
        }

        .slot-badge {
            background-color: #dbeafe;
            color: #1e40af;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 1rem;
        }

        .slot-badge.booked {
            background-color: #fef3c7;
            color: #92400e;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: #fecaca;
            color: #b91c1c;
        }

        .btn-delete:disabled {
            background-color: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }

        .empty-state small {
            color: #cbd5e1;
        }

        /* Loading State */
        .loading-spinner {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="availability-container">
            <!-- Page Header -->
            <div class="page-header">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="page-title">Manage Availability</h1>
                        <p class="page-subtitle">Add and manage your available time slots for student bookings</p>
                    </div>
                    <a href="/counselor/dashboard" class="btn btn-outline-primary">
                        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>

            <!-- Add Slot Form -->
            <div class="card-custom">
                <h2 class="card-title"><i class="fas fa-plus-circle me-2 text-primary"></i>Add Availability Slot</h2>
                <form id="addSlotForm">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="slotDate" class="form-label">Date</label>
                            <input type="date" class="form-control" id="slotDate" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="startTime" class="form-label">Start Time</label>
                            <input type="time" class="form-control" id="startTime" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="endTime" class="form-label">End Time</label>
                            <input type="time" class="form-control" id="endTime" required>
                        </div>
                        <div class="col-md-2 mb-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary-custom w-100">
                                <i class="fas fa-plus me-2"></i>Add Slot
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- My Slots List -->
            <div class="card-custom">
                <h2 class="card-title"><i class="fas fa-calendar-alt me-2 text-primary"></i>My Availability Slots</h2>
                <div id="slotsContainer">
                    <div class="text-center py-4">
                        <div class="loading-spinner"></div>
                        <p class="text-muted mt-2">Loading slots...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <div layout:fragment="scripts">
        <script th:src="@{/static/js/toast-notifications.js}"></script>
        <script>
            // API Base URL
            const API_BASE = '/api/counselor/availability';

            // Initialize on page load
            document.addEventListener('DOMContentLoaded', function () {
                loadSlots();

                // Form submission handler
                document.getElementById('addSlotForm').addEventListener('submit', handleAddSlot);

                // Set minimum date to today
                document.getElementById('slotDate').min = new Date().toISOString().split('T')[0];
            });

            /**
             * Load all availability slots
             */
            async function loadSlots() {
                const container = document.getElementById('slotsContainer');

                try {
                    const response = await fetch(API_BASE);
                    const slots = await response.json();

                    if (slots.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-calendar-plus"></i>
                                <p>No availability slots yet</p>
                                <small>Add your first slot using the form above</small>
                            </div>
                        `;
                        return;
                    }

                    // Render slots
                    container.innerHTML = slots.map(slot => createSlotHTML(slot)).join('');

                    // Attach delete handlers
                    document.querySelectorAll('.delete-slot-btn').forEach(btn => {
                        btn.addEventListener('click', () => handleDeleteSlot(btn.dataset.slotId));
                    });

                } catch (error) {
                    console.error('Error loading slots:', error);
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle text-danger"></i>
                            <p>Failed to load availability slots</p>
                            <small>${error.message}</small>
                        </div>
                    `;
                }
            }

            /**
             * Create HTML for a single slot
             */
            function createSlotHTML(slot) {
                const isBooked = slot.isBooked;
                const bookedClass = isBooked ? 'booked' : '';
                const badgeText = isBooked ? 'Booked' : 'Available';
                const deleteDisabled = isBooked ? 'disabled' : '';

                return `
                    <div class="slot-item ${bookedClass}">
                        <div class="slot-info">
                            <div class="slot-date">${slot.dateFormatted}</div>
                            <div class="slot-time">
                                <i class="far fa-clock me-1"></i>
                                ${slot.startTimeFormatted} - ${slot.endTimeFormatted}
                            </div>
                        </div>
                        <span class="slot-badge ${bookedClass}">${badgeText}</span>
                        <button class="btn-delete delete-slot-btn" 
                                data-slot-id="${slot.slotId}" 
                                ${deleteDisabled}
                                title="${isBooked ? 'Cannot delete booked slot' : 'Delete slot'}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            }

            /**
             * Handle add slot form submission
             */
            async function handleAddSlot(e) {
                e.preventDefault();

                const date = document.getElementById('slotDate').value;
                const startTime = document.getElementById('startTime').value;
                const endTime = document.getElementById('endTime').value;

                // Validate
                if (!date || !startTime || !endTime) {
                    ToastNotifications.showToast('Please fill in all fields', 'error');
                    return;
                }

                // Combine date and time
                const startDateTime = `${date}T${startTime}`;
                const endDateTime = `${date}T${endTime}`;

                // Validate end > start
                if (new Date(endDateTime) <= new Date(startDateTime)) {
                    ToastNotifications.showToast('End time must be after start time', 'error');
                    return;
                }

                try {
                    const response = await fetch(API_BASE, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            startTime: startDateTime,
                            endTime: endDateTime
                        })
                    });

                    const result = await response.json();

                    if (result.success) {
                        ToastNotifications.showSuccessToast('Availability slot added successfully!');
                        
                        // Clear form
                        document.getElementById('addSlotForm').reset();
                        
                        // Reload slots
                        loadSlots();
                    } else {
                        ToastNotifications.showToast(result.message || 'Failed to add slot', 'error');
                    }

                } catch (error) {
                    console.error('Error adding slot:', error);
                    ToastNotifications.showToast('Failed to add slot. Please try again.', 'error');
                }
            }

            /**
             * Handle delete slot
             */
            async function handleDeleteSlot(slotId) {
                if (!confirm('Are you sure you want to delete this slot?')) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/${slotId}`, {
                        method: 'DELETE'
                    });

                    const result = await response.json();

                    if (result.success) {
                        ToastNotifications.showSuccessToast('Slot deleted successfully!');
                        loadSlots();
                    } else {
                        ToastNotifications.showToast(result.message || 'Failed to delete slot', 'error');
                    }

                } catch (error) {
                    console.error('Error deleting slot:', error);
                    ToastNotifications.showToast('Failed to delete slot. Please try again.', 'error');
                }
            }
        </script>
    </div>
</body>

</html>
