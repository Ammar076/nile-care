<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">
<head><title>Admin Dashboard</title></head>
<body>
    <div layout:fragment="content">
        
        <div class="mb-4">
            <h2 class="fw-bold text-blue-900">Admin Dashboard</h2>
            <p class="text-blue-600">Welcome back! Here's what's happening today.</p>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="icon-box bg-gradient-blue">
                            <i class="fas fa-users fa-lg"></i>
                        </div>
                        <span class="badge bg-success-subtle text-success">+12%</span>
                    </div>
                    <div class="text-blue-600 small">Total Users</div>
                    <h3 class="fw-bold mb-0 text-blue-900">1,248</h3>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="icon-box bg-gradient-green">
                            <i class="fas fa-chart-line fa-lg"></i>
                        </div>
                        <span class="badge bg-success-subtle text-success">+5%</span>
                    </div>
                    <div class="text-blue-600 small">Active Sessions</div>
                    <h3 class="fw-bold mb-0 text-blue-900">87</h3>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="icon-box bg-gradient-purple">
                            <i class="fas fa-file-alt fa-lg"></i>
                        </div>
                        <span class="badge bg-success-subtle text-success">+23%</span>
                    </div>
                    <div class="text-blue-600 small">Reports Generated</div>
                    <h3 class="fw-bold mb-0 text-blue-900">342</h3>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card card-custom h-100 p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="icon-box bg-gradient-orange">
                            <i class="fas fa-calendar-check fa-lg"></i>
                        </div>
                        <span class="badge bg-success-subtle text-success">+8%</span>
                    </div>
                    <div class="text-blue-600 small">Counseling Appointments</div>
                    <h3 class="fw-bold mb-0 text-blue-900">156</h3>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card card-custom p-4 h-100">
                    <h5 class="fw-bold text-blue-900 mb-4">Recent Activity</h5>
                    <div class="d-flex flex-column gap-3">
                        <div class="d-flex justify-content-between p-3 bg-light rounded-3 align-items-center">
                            <div>
                                <h6 class="fw-bold text-blue-900 mb-0">Sarah Johnson</h6>
                                <small class="text-blue-600">Completed Module 3</small>
                            </div>
                            <small class="text-muted">5 min ago</small>
                        </div>
                        </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card card-custom p-4 h-100">
                    <h5 class="fw-bold text-blue-900 mb-4">Quick Actions</h5>
                    <div class="d-grid gap-3">
                        <a href="#" class="btn btn-outline-primary py-3 text-start px-4 fw-bold border-2">
                            <i class="fas fa-user-plus me-2"></i> Add New User
                        </a>
                        <a href="#" class="btn btn-outline-success py-3 text-start px-4 fw-bold border-2">
                            <i class="fas fa-file-export me-2"></i> Generate Report
                        </a>
                        <a href="#" class="btn btn-outline-secondary py-3 text-start px-4 fw-bold border-2">
                            <i class="fas fa-cog me-2"></i> System Settings
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
