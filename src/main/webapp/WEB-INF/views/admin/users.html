<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">
<head><title>Manage Users</title></head>
<body>
    <div layout:fragment="content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold" style="color: #1e3a8a;">Manage User Accounts</h2>
                <p class="text-muted">View and manage all registered users</p>
            </div>
            <button class="btn btn-success text-white fw-bold d-flex align-items-center gap-2" 
                    data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fas fa-user-plus"></i> Add New User
            </button>
        </div>

        <div class="card card-custom mb-4">
            <div class="card-body p-3">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" class="form-control bg-light border-start-0" placeholder="Search users by name or email...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select bg-light">
                            <option value="all">All Roles</option>
                            <option value="STUDENT">Student</option>
                            <option value="COUNSELOR">Counselor</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card card-custom overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Verified</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="i : ${#numbers.sequence(1, 5)}"> 
                            <td class="ps-4 fw-bold text-dark">Sarah Johnson</td>
                            <td class="text-muted">sarah.j@example.com</td>
                            <td><span class="badge bg-light text-primary border border-primary-subtle">Student</span></td>
                            <td><span class="badge bg-success-subtle text-success">Active</span></td>
                            <td><i class="fas fa-check-circle text-success"></i></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-light text-primary me-1"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-light text-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="modal fade" id="addUserModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Add New User</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" placeholder="John Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="john@example.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Role</label>
                                <select class="form-select">
                                    <option value="STUDENT">Student</option>
                                    <option value="COUNSELOR">Counselor</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create User</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
