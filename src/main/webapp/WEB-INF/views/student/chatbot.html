<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">

<head>
  <title>AI Assistant</title>
  <link rel="stylesheet" th:href="@{/static/css/chatbot.css}">
</head>

<body>
  <div layout:fragment="content">
    <div class="mb-4">
      <h1 class="fw-bold mb-2" style="color: #1e3a8a;">AI Chatbot Assistant</h1>
      <p style="color: #2563eb;">Get instant help and guidance for your mental health journey</p>
    </div>

    <div class="row g-4">
      <!-- Main Chat Area -->
      <div class="col-lg-9">
        <div class="card card-custom d-flex flex-column" style="height: calc(100vh - 250px);">
          <!-- Chat Header -->
          <div class="card-header bg-white border-bottom p-3">
            <div class="d-flex align-items-center gap-3">
              <div class="rounded-3 p-2 text-white d-flex align-items-center justify-content-center"
                style="background: linear-gradient(135deg, #3b82f6, #22c55e); width: 40px; height: 40px;">
                <i class="fas fa-robot"></i>
              </div>
              <div>
                <h6 class="mb-0 fw-bold" style="color: #1e3a8a;">MindCare Assistant</h6>
                <small class="text-success">
                  <i class="fas fa-circle fa-xs me-1"></i>Online
                </small>
              </div>
            </div>
          </div>

          <!-- Messages Container -->
          <div class="card-body flex-grow-1 overflow-auto p-4" id="chat-messages" style="background-color: #f8fafc;">
            <!-- Messages will be rendered here by JavaScript -->
          </div>

          <!-- Input Area -->
          <div class="card-footer bg-white p-3 border-top">
            <div class="d-flex gap-2">
              <input type="text" id="message-input" class="form-control" placeholder="Type your message..."
                style="background-color: #f8fafc; border-color: #e2e8f0;">
              <button class="btn text-white px-4" style="background: linear-gradient(to right, #3b82f6, #22c55e);"
                onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Actions Sidebar -->
      <div class="col-lg-3">
        <div class="card card-custom p-3">
          <h6 class="fw-bold mb-3" style="color: #1e3a8a;">Quick Actions</h6>

          <button class="btn btn-outline-secondary w-100 text-start mb-2" onclick="quickAction('stress')">
            <i class="fas fa-heart text-danger me-2"></i>Stress Help
          </button>
          <button class="btn btn-outline-secondary w-100 text-start mb-2" onclick="quickAction('module')">
            <i class="fas fa-book-open text-primary me-2"></i>Find Modules
          </button>
          <button class="btn btn-outline-secondary w-100 text-start mb-2" onclick="quickAction('counseling')">
            <i class="fas fa-comments text-success me-2"></i>Book Counseling
          </button>
          <button class="btn btn-outline-secondary w-100 text-start mb-3" onclick="quickAction('assessment')">
            <i class="fas fa-lightbulb text-warning me-2"></i>Assessments
          </button>

          <div class="border-top pt-3 mb-3">
            <h6 class="small fw-bold mb-2" style="color: #1e3a8a;">Common Topics</h6>
            <div class="d-flex flex-wrap gap-2">
              <span class="badge bg-light text-dark border" style="cursor: pointer;"
                onclick="quickAction('anxiety')">Anxiety</span>
              <span class="badge bg-light text-dark border" style="cursor: pointer;"
                onclick="quickAction('stress')">Stress</span>
              <span class="badge bg-light text-dark border" style="cursor: pointer;"
                onclick="quickAction('sleep')">Sleep</span>
              <span class="badge bg-light text-dark border" style="cursor: pointer;"
                onclick="quickAction('mindfulness')">Mindfulness</span>
            </div>
          </div>

          <div class="p-3 rounded-3" style="background-color: #eff6ff;">
            <p class="small mb-2" style="color: #2563eb;">
              <i class="fas fa-lightbulb me-1"></i><strong>Tip:</strong>
            </p>
            <p class="small mb-0" style="color: #2563eb;">
              This chatbot provides general guidance. For personalized support, please book a session with
              our counselors.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <th:block layout:fragment="scripts">
    <script th:src="@{/static/js/chatbot.js}"></script>
  </th:block>
</body>

</html>
