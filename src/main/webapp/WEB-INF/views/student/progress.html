<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">
<head>
    <title>Track Progress</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div layout:fragment="content">
        <div class="mb-4">
            <h2 class="fw-bold" style="color: #1e3a8a;">Track Your Progress</h2>
            <p class="text-muted">Monitor your learning journey and achievements</p>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card card-custom p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="rounded-3 p-3 text-white" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">
                            <i class="fas fa-bullseye fa-lg"></i>
                        </div>
                        <span class="badge bg-success-subtle text-success">+15%</span>
                    </div>
                    <div class="text-muted small">Overall Progress</div>
                    <h3 class="fw-bold mb-0 text-dark">67%</h3>
                </div>
            </div>
            </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card card-custom p-4 h-100">
                    <h5 class="fw-bold mb-4 text-dark">Weekly Activity</h5>
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card card-custom p-4 h-100">
                    <h5 class="fw-bold mb-4 text-dark">Recent Learning Activity</h5>
                    
                    <div class="d-flex flex-column gap-3">
                        <div class="p-3 rounded-3 bg-light border-0">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="fw-bold text-dark">Stress Management</span>
                                <span class="small text-muted">2 hours ago</span>
                            </div>
                            <div class="d-flex align-items-center gap-3">
                                <div class="progress flex-grow-1" style="height: 8px;">
                                    <div class="progress-bar bg-primary" style="width: 75%"></div>
                                </div>
                                <span class="fw-bold text-primary small">75%</span>
                            </div>
                        </div>
                        
                        <div class="p-3 rounded-3 bg-light border-0">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="fw-bold text-dark">Mindfulness & Meditation</span>
                                <span class="small text-muted">Yesterday</span>
                            </div>
                            <div class="d-flex align-items-center gap-3">
                                <div class="progress flex-grow-1" style="height: 8px;">
                                    <div class="progress-bar bg-warning" style="width: 30%"></div>
                                </div>
                                <span class="fw-bold text-warning small">30%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Chart.js implementation for Weekly Activity
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Minutes Learned',
                        data: [45, 30, 60, 40, 55, 20, 35],
                        backgroundColor: '#3b82f6',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        </script>
    </div>
</body>
</html>
