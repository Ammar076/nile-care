<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">
<head>
    <title>Submit Feedback</title>
    <style>
        .rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; }
        .rating input { display: none; }
        .rating label { cursor: pointer; color: #ccc; font-size: 1.5rem; padding: 0 5px; }
        .rating input:checked ~ label, .rating label:hover, .rating label:hover ~ label { color: #fbbf24; } /* Yellow-400 */
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="mb-4">
            <h2 class="fw-bold" style="color: #1e3a8a;">Submit Feedback</h2>
            <p class="text-muted">Share your thoughts and help us improve</p>
        </div>

        <div class="row g-5">
            <div class="col-lg-6">
                <div class="card card-custom p-4">
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Category</label>
                            <select class="form-select bg-light">
                                <option>Learning Modules</option>
                                <option>Counseling Service</option>
                                <option>Platform Experience</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Rating</label>
                            <div class="rating">
                                <input type="radio" name="rating" id="star5" value="5"><label for="star5"><i class="fas fa-star"></i></label>
                                <input type="radio" name="rating" id="star4" value="4"><label for="star4"><i class="fas fa-star"></i></label>
                                <input type="radio" name="rating" id="star3" value="3"><label for="star3"><i class="fas fa-star"></i></label>
                                <input type="radio" name="rating" id="star2" value="2"><label for="star2"><i class="fas fa-star"></i></label>
                                <input type="radio" name="rating" id="star1" value="1"><label for="star1"><i class="fas fa-star"></i></label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Subject</label>
                            <input type="text" class="form-control bg-light" placeholder="Brief summary">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Message</label>
                            <textarea class="form-control bg-light" rows="5" placeholder="Tell us what you think..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100"><i class="fas fa-paper-plane me-2"></i> Submit Feedback</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card card-custom p-4 mb-4">
                    <h5 class="fw-bold mb-3 text-dark">Why Feedback Matters</h5>
                    <div class="alert bg-primary-subtle text-primary border-0 mb-3">
                        <i class="fas fa-lightbulb me-2"></i> Your feedback directly shapes future features.
                    </div>
                    <div class="alert bg-success-subtle text-success border-0">
                        <i class="fas fa-check-circle me-2"></i> We respond within 3-5 business days.
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
