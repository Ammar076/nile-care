<!DOCTYPE html>
<html layout:decorate="~{layout/main_layout}">
<head>
    <title>Learning Modules</title>
    <style>
        /* Page Background - Specific Lighter Green */
        .page-container { background-color: #f6fef9; min-height: 100vh; padding: 2rem; }

        /* Image Zoom Effect */
        .module-img-wrapper { height: 190px; overflow: hidden; position: relative; }
        .module-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card-custom:hover .module-img { transform: scale(1.08); }

        /* Module Button Structure */
        .btn-module {
            border-radius: 8px; padding: 10px; font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; transition: opacity 0.2s; text-decoration: none;
        }
        .btn-module:hover { opacity: 0.95; }

        /* Filter Buttons */
        .btn-filter { border-radius: 50px; padding: 6px 20px; font-size: 0.9rem; font-weight: 500; border: 1px solid transparent; background: white; color: #2563eb; margin-right: 8px; }
        .btn-filter.active { background-color: #3b82f6; color: white; font-weight: 600; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); }
        
        /* Progress Bar */
        .progress-track { height: 6px; background-color: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .progress-fill { background-color: #0f172a; height: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div layout:fragment="content" class="h-100">
        <div class="page-container">
            
            <div class="mb-4">
                <h3 class="fw-semibold text-blue-900 mb-1">Learning Modules</h3>
                <p class="text-blue-600 small">Explore our comprehensive mental health learning resources</p>
            </div>

            <div class="d-flex mb-4">
                <button class="btn-filter active">All Modules</button>
                <button class="btn-filter">In Progress</button>
                <button class="btn-filter">Bookmarked</button>
                <button class="btn-filter">Completed</button>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="module : ${modules}">
                    <div class="card card-custom h-100 border-0 shadow-sm overflow-hidden">
                        
                        <div class="module-img-wrapper">
                            <img th:src="${module.contentUrl}" class="module-img" alt="Cover">
                            <button class="btn btn-light btn-sm rounded-circle position-absolute top-0 end-0 m-3 shadow-sm" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                                <i class="far fa-bookmark text-blue-600"></i>
                            </button>
                        </div>

                        <div class="p-4 d-flex flex-column flex-grow-1">
                            <div class="d-flex align-items-center mb-3">
                                <span class="tag-pill tag-gray" th:text="${module.category}">Category</span>
                                <span class="tag-pill"
                                      th:classappend="${module.difficultyLevel == 'Beginner' ? 'tag-green' : (module.difficultyLevel == 'Advanced' ? 'tag-purple' : 'tag-blue')}"
                                      th:text="${module.difficultyLevel}">Level</span>
                            </div>

                            <h5 class="fw-bold text-blue-900 mb-2" style="font-size: 1.05rem;" th:text="${module.title}">Title</h5>
                            <p class="text-muted small mb-4 line-clamp-2" th:text="${#strings.abbreviate(module.description, 100)}">Desc</p>

                            <div class="mt-auto">
                                <div class="d-flex align-items-center gap-2 small text-blue-600 mb-3">
                                    <i class="far fa-clock"></i> <span style="font-weight: 500;">45 min</span>
                                </div>

                                <div class="d-flex justify-content-between small mb-1">
                                    <span class="text-blue-600 fw-medium">Progress</span>
                                    <span class="fw-bold text-blue-900" 
                                          th:text="${module.title.contains('Fundamentals') ? '75%' : (module.title.contains('Emotional') ? '100%' : '0%')}">0%</span>
                                </div>
                                <div class="progress-track mb-4">
                                    <div class="progress-fill" 
                                         th:style="'width: ' + (${module.title.contains('Fundamentals') ? '75%' : (module.title.contains('Emotional') ? '100%' : '0%')})"></div>
                                </div>

                                <a href="#" class="btn-module bg-gradient-custom shadow-sm">
                                    
                                    <span th:if="${!module.title.contains('Fundamentals') and !module.title.contains('Emotional')}" class="d-flex align-items-center gap-2">
                                        <i class="fas fa-play-circle"></i> Start Module
                                    </span>
                                    
                                    <span th:if="${module.title.contains('Fundamentals')}" class="d-flex align-items-center gap-2">
                                        <i class="fas fa-play-circle"></i> Continue
                                    </span>

                                    <span th:if="${module.title.contains('Emotional')}" class="d-flex align-items-center gap-2">
                                        <i class="fas fa-check-circle"></i> Review
                                    </span>

                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
