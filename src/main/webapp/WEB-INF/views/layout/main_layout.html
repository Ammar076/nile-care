<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <title>MindCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/static/css/style.css}">

    <style>
        /* Layout Specifics */
        body { overflow: hidden; background: #f8fafc; }
        .wrapper { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; height: 100vh; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 1000; }
        .logo-container { padding: 1.5rem; border-bottom: 1px solid #f1f5f9; }
        
        .logo-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--gradient-primary); /* Uses style.css var */
            display: flex; align-items: center; justify-content: center;
            color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); font-size: 1.2rem;
        }

        .main-content { flex: 1; display: flex; flex-direction: column; background: #f8fafc; overflow: hidden; }
        .top-nav { height: 72px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; z-index: 50; }
        .scrollable-area { flex: 1; overflow-y: auto; padding: 0; }
        
        /* Search Container Fix */
        .search-container { position: relative; width: 100%; max-width: 480px; }
        
        /* Dropdown Z-Index Fix */
        .dropdown-menu { z-index: 9999 !important; }
    </style>
</head>
<body>
<div class="wrapper">
    
    <aside class="sidebar">
        <div class="logo-container">
            <div class="d-flex align-items-center gap-3">
                <div class="logo-icon">                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"></path></svg>
</i></div>
                <div style="line-height: 1.2;">
                    <h5 class="mb-0 fw-bold" style="color: #1e3a8a;">MindCare</h5>
                    <small style="color: #3b82f6; font-size: 0.75rem; font-weight: 600;">Learning & Wellness</small>
                </div>
            </div>
        </div>

        <nav class="p-3 flex-grow-1 overflow-auto">
            <div th:if="${session.currentUser != null and session.currentUser.roles[0].name.name() == 'ROLE_STUDENT'}">
                <a th:href="@{/learning}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/learning') ? 'active' : ''}">
                    <i class="fas fa-book-open"></i> Learning Modules
                </a>
                <a th:href="@{/progress}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/progress') ? 'active' : ''}">
                    <i class="fas fa-chart-line"></i> Track Progress
                </a>
                <a th:href="@{/support/request}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/support') ? 'active' : ''}">
                    <i class="fas fa-question-circle"></i> Help Requests
                </a>
                <a th:href="@{/counseling}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/counseling') ? 'active' : ''}">
                    <i class="far fa-calendar-alt"></i> Counseling
                </a>
                <a th:href="@{/assessment}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/assessment') ? 'active' : ''}">
                    <i class="fas fa-clipboard-list"></i> Assessments
                </a>
                <a th:href="@{/chat}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/chat') ? 'active' : ''}">
                    <i class="far fa-comments"></i> Chatbot
                </a>
                <a th:href="@{/feedback}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('/feedback') ? 'active' : ''}">
                    <i class="far fa-comment-alt"></i> Feedback
                </a>
            </div>

            <div th:if="${session.currentUser != null and session.currentUser.roles[0].name.name() == 'ROLE_ADMIN'}">
                <a th:href="@{/admin/dashboard}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('dashboard') ? 'active' : ''}">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a th:href="@{/admin/users}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('users') ? 'active' : ''}">
                    <i class="fas fa-users"></i> Manage Users
                </a>
                <a th:href="@{/admin/roles}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('roles') ? 'active' : ''}">
                    <i class="fas fa-shield-alt"></i> Set Roles
                </a>
                <a th:href="@{/admin/reports}" class="nav-link-custom" th:classappend="${#httpServletRequest.requestURI.contains('reports') ? 'active' : ''}">
                    <i class="fas fa-file-alt"></i> Reports
                </a>
            </div>
            
            <div class="mt-auto border-top pt-3">
                <a th:href="@{/logout}" class="nav-link-custom text-danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </nav>
    </aside>

    <div class="main-content">
        <header class="top-nav">
            <div class="flex-grow-1 d-flex justify-content-start">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search modules, resources, help...">
                </div>
            </div>

            <div class="d-flex align-items-center gap-3">
                <button class="btn-icon">
                    <i class="far fa-bell fa-lg"></i>
                    <span class="badge-notification"></span>
                </button>

                <div class="dropdown" th:if="${session.currentUser != null}">
                    <div class="d-flex align-items-center gap-2 cursor-pointer p-1 rounded-pill hover:bg-gray-50" data-bs-toggle="dropdown">
                        <div class="avatar-circle">
                            <span th:text="${session.currentUser.fullName.substring(0,1)}">U</span>
                        </div>
                        <div class="d-none d-md-block text-start ps-1" style="line-height: 1.2;">
                            <div class="small fw-bold text-blue-900" th:text="${session.currentUser.fullName}">User</div>
                            <div class="text-blue-600 small text-uppercase" style="font-size: 0.7rem;" th:text="${session.currentUser.roles[0].name}">ROLE</div>
                        </div>
                    </div>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 p-2 mt-2" style="width: 200px;">
                         <li><h6 class="dropdown-header text-muted text-uppercase small fw-bold">My Account</h6></li>
                         <li><hr class="dropdown-divider bg-light my-1"></li>
                         <li><a class="dropdown-item rounded-3 py-2 text-secondary" href="#">Profile Settings</a></li>
                         <li><a class="dropdown-item rounded-3 py-2 text-secondary" href="#">Preferences</a></li>
                         <li><hr class="dropdown-divider bg-light my-1"></li>
                         <li><a class="dropdown-item rounded-3 py-2 text-danger fw-medium" th:href="@{/logout}"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                    </ul>
                </div>

                <div th:if="${session.currentUser == null}">
                    <a th:href="@{/login}" class="btn btn-sm btn-primary rounded-pill px-3 bg-gradient-custom">Login</a>
                </div>
            </div>
        </header>
        <main class="scrollable-area" layout:fragment="content"></main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
